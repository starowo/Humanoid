# Discord Bot 配置文件示例
# 复制此文件为 config.yaml 并填写你的配置

# Bot Token (从 Discord Developer Portal 获取)
token: "YOUR_BOT_TOKEN_HERE"

# Bot 命令前缀
prefix: "/"

# 允许使用 bot 的身份组 ID 列表
allowed_role_ids:
  - 1234567890  # 替换为你的身份组 ID

# 频道管理配置
channel_manager:
  # 允许被修改名称的频道 ID 列表
  allowed_channel_ids:
    - 1234567890  # 替换为你要允许修改的频道 ID
  
  # 频道名称修改冷却时间（秒）Discord API 限制：每10分钟最多2次
  cooldown: 300  # 5分钟冷却
  
  # 默认频道名称前缀 emoji
  default_emoji: "💬"
  
  # 违禁词配置（按频道ID）
  banned_words:
    # 示例：频道ID和对应的违禁词列表
    1234567890:
      - "违禁词1"
      - "违禁词2"

# 一键冲水配置
message_cleaner:
  # 用户 Token（用于调用 Discord API v9 搜索接口）
  # 获取方法：F12 打开开发者工具 -> Network -> 找到任意请求 -> Headers -> Authorization
  user_token: "YOUR_USER_TOKEN_HERE"
  
  # 搜索间隔（秒）避免速率限制
  search_interval: 5
  
  # 删除批次大小（每批删除多少条消息）
  delete_batch_size: 10
  
  # 最大消息数（防止搜索过多消息）
  max_messages: 100000

# AI客服配置
ai_customer_service:
  gemini:
    # Gemini API Key
    api_key: "YOUR_GEMINI_API_KEY"
    # 代理/自定义 API 地址（留空使用官方地址）
    proxy_url: "https://generativelanguage.googleapis.com"
    # 模型名称
    model: "gemini-2.0-flash"
    # 系统提示词文件路径（独立文本文件，方便编辑长提示词）
    system_prompt_file: "config/ai_system_prompt.txt"
    # 尾部附加提示词文件路径（追加在系统提示词末尾，用于强化规则，留空则不使用）
    tail_prompt_file: ""

  # 管理频道 ID（工具调用 send_to_admin 的目标频道）
  admin_channel_id: 1234567890

  # 对话历史最大轮数
  max_history: 50

  # 单个附件最大大小（字节），默认 10MB
  max_attachment_size: 10485760

  # 自动回复配置
  auto_reply:
    # 是否启用自动回复（检测新频道并自动开启AI客服）
    enabled: false
    # 监控的频道分类 ID 列表（在这些分类下新建频道时自动启用）
    category_ids:
      - 1234567890
    # 新频道的问候消息
    greeting: "你好！我是AI客服助手，有什么可以帮助你的吗？"

# 热重载配置
hot_reload:
  enabled: true
  watch_interval: 2  # 配置文件检查间隔（秒）

